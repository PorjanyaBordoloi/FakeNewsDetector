<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fake News Detector</title>
    <style>
        body {
            width: 300px;
            padding: 16px;
            font-family: 'Inter', sans-serif;
            margin: 0;
        }

        .popup-container {
            text-align: center;
        }

        .header h1 {
            font-size: 16px;
            margin: 0 0 12px 0;
        }

        .hidden {
            display: none;
        }

        .spinner {
            width: 32px;
            height: 32px;
            border: 3px solid #e5e7eb;
            border-top-color: #3b82f6;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 16px auto;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        .verdict {
            padding: 16px;
            border-radius: 8px;
            margin-top: 12px;
        }

        .verdict-fake {
            background: #fef2f2;
            border: 1px solid #fca5a5;
        }

        .verdict-real {
            background: #f0fdf4;
            border: 1px solid #86efac;
        }

        .verdict-misleading {
            background: #fffbeb;
            border: 1px solid #fcd34d;
        }

        .score-badge {
            font-size: 18px;
            font-weight: 700;
            margin-bottom: 8px;
        }

        .verdict h2 {
            margin: 8px 0;
            font-size: 16px;
        }

        .verdict p {
            font-size: 13px;
            color: #6b7280;
            margin: 4px 0;
        }

        #view-details {
            margin-top: 12px;
            padding: 8px 16px;
            background: #3b82f6;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 13px;
        }

        #view-details:hover {
            background: #2563eb;
        }
    </style>
</head>

<body>
    <div class="popup-container">
        <div class="header">
            <h1>🔍 Fake News Detector</h1>
        </div>

        <div id="loading" class="hidden">
            <div class="spinner"></div>
            <p>Analyzing article...</p>
        </div>

        <div id="result" class="hidden">
            <div id="verdict-container" class="verdict">
                <div id="score-badge" class="score-badge"></div>
                <h2 id="verdict-text"></h2>
                <p id="verdict-description"></p>
                <button id="view-details">View Full Analysis</button>
            </div>
        </div>

        <div id="not-article">
            <p>Click to analyze the current page.</p>
            <button id="analyze-btn">Analyze This Page</button>
        </div>
    </div>

    <script src="popup.js"></script>
</body>

</html>
